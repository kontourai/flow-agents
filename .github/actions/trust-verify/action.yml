# trust-verify/action.yml — Reusable composite action: Flow Agents trust anchor.
#
# INTENDED AS A REQUIRED STATUS CHECK. Add this job to your workflow, then add
# "Trust Verify" as a required, no-bypass status check in GitHub branch protection.
# Once required, no PR can merge past it — the external CI anchor is armed.
#
# What it does:
#   1. Re-runs your canonical verify command FRESH in a clean CI environment that
#      the agent does not control (build + tests + lint — whatever you declare).
#   2. If a delivery/trust.bundle is present, RECONCILES the agent's claimed-pass
#      commands against CI's own fresh results. Any divergence (claimed pass + CI
#      fail, laundered command, claim with no evidence, checkpoint-only bundle)
#      fails the job with a clear diagnostic.
#   3. Optionally mints a signed in-toto attestation over CI's own fresh results
#      (requires id-token: write in the calling job).
#
# Inputs:
#   verify-command    [required]  Your comprehensive verify command (build + tests +
#                                 lint). What the agent ran locally should match what
#                                 this reruns in CI.
#   bundle            [optional]  Explicit path to the delivered trust.bundle. When
#                                 omitted, the reconciler performs ownership-aware
#                                 discovery across flat and per-session delivery paths.
#   fail-on-divergence [deprecated] Accepted for caller compatibility but no longer
#                                 weakens the gate. Use missing-bundle-policy for the
#                                 narrow advisory-adoption case.
#   missing-bundle-policy [optional] `required` fails when no current bundle or
#                                 DECLARED exemption exists; `advisory` reports the
#                                 missing evidence after fresh verification (default: required).
#   sign              [optional]  Mint a signed in-toto attestation after a clean
#                                 reconcile (default: false). Requires id-token: write.
#   node-version      [optional]  Node.js version (default: 24).
#
# Usage in a downstream repo:
#
#   jobs:
#     trust-verify:
#       name: Trust Verify
#       runs-on: ubuntu-latest
#       permissions:
#         contents: read
#         id-token: write   # only needed when sign: true
#       steps:
#         - uses: actions/checkout@<sha>
#         - uses: kontourai/flow-agents/.github/actions/trust-verify@<sha>
#           with:
#             verify-command: "npm run build && npm test && npm run lint"
#
# Then in GitHub branch protection → "Require status checks":
#   Add "Trust Verify" as a required check with no bypass option.
#
# The agent publishes delivery/trust.bundle during the deliver skill. When that file
# is present in the PR's checkout, this action reconciles per-command claimed passes
# against fresh CI truth. When absent, missing-bundle-policy selects required (the
# fail-closed default) or advisory reporting after fresh verification passes.
#
# See docs/trust-anchor-adoption.md for the full adoption guide.

name: "Flow Agents Trust Verify"
description: >
  Re-runs canonical verification fresh and reconciles a delivered trust.bundle's
  claimed passes against CI results. Intended as a required status check.

inputs:
  verify-command:
    description: >
      Canonical verify command (build + tests + lint). Comma-separated commands
      are each run in sequence. Fail-closed if not provided and no
      trust-reconcile-verify script is in package.json.
    required: true
  bundle:
    description: >
      Explicit path to the delivered trust.bundle (relative to workspace root).
      Leave empty for ownership-aware discovery across legacy flat and per-session
      delivery paths.
    required: false
    default: ""
  fail-on-divergence:
    description: >
      Deprecated compatibility input. Divergence and fresh verification failures
      always fail. Use missing-bundle-policy=advisory only to observe missing
      delivery evidence during adoption.
    required: false
    default: "true"
  missing-bundle-policy:
    description: >
      Policy when no bundle for the current change is present. `required` fails
      closed unless a governed DECLARED exemption applies; `advisory` reports the
      missing evidence without failing after fresh verification passes.
    required: false
    default: "required"
  sign:
    description: >
      Mint a signed in-toto attestation after a clean reconcile (default: false).
      Requires id-token: write permission in the calling job. The attestation is
      uploaded as a workflow artifact named trust-attestation.
    required: false
    default: "false"
  node-version:
    description: "Node.js version to use."
    required: false
    default: "24"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    # Composite-action checkouts contain source files but not node_modules. Install the
    # anchor's locked runtime dependencies at its own repository root so helpers such as
    # derive-claim-status.mjs can resolve @kontourai/surface without depending on the
    # consumer repository's package graph. Lifecycle scripts stay disabled because this
    # action only needs the published runtime modules.
    - name: Install trust verifier dependencies
      shell: bash
      run: |
        ACTION_REPO_ROOT="${{ github.action_path }}/../../.."
        npm ci --omit=dev --include=optional --ignore-scripts --no-audit --no-fund --prefix "$ACTION_REPO_ROOT"

    # Explicit caller paths remain explicit. When omitted, trust-reconcile.js owns
    # discovery so its ownership, staleness, and prefer-newest checks cannot be bypassed
    # by a wrapper converting an auto-discovered path into a trusted explicit path.
    - name: Trust verify
      id: trust-verify
      shell: bash
      env:
        VERIFY_COMMAND: ${{ inputs.verify-command }}
        BUNDLE_INPUT: ${{ inputs.bundle }}
        MISSING_BUNDLE_POLICY: ${{ inputs.missing-bundle-policy }}
      run: |
        if [ -n "$BUNDLE_INPUT" ]; then
          echo "[trust-verify] using caller-selected delivery bundle: $BUNDLE_INPUT"
          BUNDLE_ARG="--bundle $BUNDLE_INPUT"
        else
          BUNDLE_ARG=""
        fi

        # action_path is .github/actions/trust-verify/ — climb THREE levels to the
        # repo root where scripts/ lives (trust-verify -> actions -> .github -> root).
        node "${{ github.action_path }}/../../../scripts/ci/trust-reconcile.js" \
          --commands "$VERIFY_COMMAND" \
          --repo-root "${{ github.workspace }}" \
          --missing-bundle-policy "$MISSING_BUNDLE_POLICY" \
          $BUNDLE_ARG

    # Phase 2 (optional): mint a signed in-toto attestation over CI's own fresh results.
    # Only runs when sign=true and the trust-verify step passed.
    # Requires id-token: write in the calling job for Sigstore keyless signing.
    - name: Mint attestation
      if: inputs.sign == 'true' && steps.trust-verify.outcome == 'success'
      shell: bash
      run: node "${{ github.action_path }}/../../../scripts/ci/mint-attestation.js"

    - name: Upload attestation
      if: inputs.sign == 'true' && steps.trust-verify.outcome == 'success'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trust-attestation
        path: |
          trust.attestation.sig.json
          trust.attestation.intoto.json
          trust.attestation.status.json
        if-no-files-found: ignore
        retention-days: 30
