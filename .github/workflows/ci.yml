name: Flow Agents CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flow-agents-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Suite-wide secret-scan gate, defined once in kontourai/.github (Hachure: one
  # normative source). Scans git-tracked history; gitignored runtime/.env excluded.
  secret-scan:
    name: Secret Scan
    uses: kontourai/.github/.github/workflows/secret-scan.yml@main
    permissions:
      contents: read

  source-and-static:
    name: Source and Static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLOW_AGENTS_CI_LANE: source-and-static
      FLOW_AGENTS_CI_RESULTS_DIR: evals/results/ci-baseline/source-and-static
      FLOW_CLI_ROOT: ${{ github.workspace }}/.flow-cli/node_modules/@kontourai/flow

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Flow CLI for definition validation
        run: |
          mkdir -p .flow-cli
          cd .flow-cli
          printf '{"name":"flow-cli-host","private":true}\n' > package.json
          # Pinned to ~1.3.0: gate evidence uses the Hachure trust.bundle format
          # (kontourai/flow#84). flow-agents migrated surface.claim -> trust.bundle.
          npm install --no-save @kontourai/flow@~1.3.0

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Initialize CI evidence
        run: bash evals/ci/run-baseline.sh --init

      - name: Content boundary
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check content-boundary

      - name: Decision registry
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check decision-registry

      - name: Source tree validation
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check source-tree-validation

      - name: Context map drift
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check context-map-drift

      - name: Static eval suite
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check static-eval-suite

      - name: Finalize CI evidence
        if: always()
        run: bash evals/ci/run-baseline.sh --finalize

      - name: Upload CI evidence artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flow-agents-ci-source-and-static
          path: evals/results/ci-baseline/source-and-static/
          if-no-files-found: warn
          retention-days: 14

  workflow-contracts:
    name: Workflow Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FLOW_AGENTS_CI_LANE: workflow-contracts
      FLOW_AGENTS_CI_RESULTS_DIR: evals/results/ci-baseline/workflow-contracts

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm ci

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Initialize CI evidence
        run: bash evals/ci/run-baseline.sh --init

      - name: Workflow artifact integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check workflow-artifact-integration

      - name: Workflow artifact cleanup audit integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check workflow-artifact-cleanup-audit-integration

      - name: Fixture retirement audit integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check fixture-retirement-audit-integration

      - name: Publish-change helper integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check publish-change-helper-integration

      - name: Workflow sidecar writer integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check workflow-sidecar-writer-integration

      - name: Sidecar field preservation integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check sidecar-field-preservation-integration

      - name: Actor identity resolver integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check actor-identity-resolver-integration

      - name: Finalize CI evidence
        if: always()
        run: bash evals/ci/run-baseline.sh --finalize

      - name: Upload CI evidence artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flow-agents-ci-workflow-contracts
          path: evals/results/ci-baseline/workflow-contracts/
          if-no-files-found: warn
          retention-days: 14

  runtime-and-kit:
    name: Runtime and Kit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLOW_AGENTS_CI_LANE: runtime-and-kit
      FLOW_AGENTS_CI_RESULTS_DIR: evals/results/ci-baseline/runtime-and-kit

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm ci

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Initialize CI evidence
        run: bash evals/ci/run-baseline.sh --init

      - name: Goal Fit hook integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check goal-fit-hook-integration

      - name: Hook category behavior integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check hook-category-behavior-integration

      - name: Workflow steering hook integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check workflow-steering-hook-integration

      - name: Hook influence contract integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check hook-influence-contract-integration

      - name: Flow Kit repository integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check flow-kit-repository-integration

      - name: Runtime adapter activation integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check runtime-adapter-activation-integration

      - name: Bundle install integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check bundle-install-integration

      - name: Bundle lifecycle integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check bundle-lifecycle-integration

      - name: Activate npx context integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check activate-npx-context-integration

      - name: Kit conformance levels integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check kit-conformance-levels-integration

      - name: Local Flow Kit install integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check local-flow-kit-install-integration

      - name: Flow Kit install-git integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check flow-kit-install-git-integration

      - name: Console learning projection integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check console-learning-projection-integration

      - name: Context map integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check context-map-integration

      - name: Effective backlog settings integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check effective-backlog-settings-integration

      - name: Flow agents statusline integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check flow-agents-statusline-integration

      - name: Telemetry contract integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check telemetry-contract-integration

      - name: Liveness heartbeat integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check liveness-heartbeat-integration

      - name: Telemetry doctor integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check telemetry-doctor-integration

      - name: Usage and cost integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check usage-and-cost-integration

      - name: Utterance check integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check utterance-check-integration

      - name: Pull work provider integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check pull-work-provider-integration

      - name: Pull work liveness preflight integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check pull-work-liveness-preflight-integration

      - name: Veritas governance kit integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check veritas-governance-kit-integration

      # The anti-gaming + trust regression suite runs in this REQUIRED lane so that
      # weakening the gate / CI anchor / their protections (or removing a regression
      # test) is caught and cannot merge. Convergence red-team (Round 5/7) closure.
      - name: Anti-gaming and trust suite
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check anti-gaming-and-trust-suite

      - name: Finalize CI evidence
        if: always()
        run: bash evals/ci/run-baseline.sh --finalize

      - name: Upload CI evidence artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flow-agents-ci-runtime-and-kit
          path: evals/results/ci-baseline/runtime-and-kit/
          if-no-files-found: warn
          retention-days: 14

  usage-feedback:
    name: Usage Feedback
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLOW_AGENTS_CI_LANE: usage-feedback
      FLOW_AGENTS_CI_RESULTS_DIR: evals/results/ci-baseline/usage-feedback

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm ci

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Initialize CI evidence
        run: bash evals/ci/run-baseline.sh --init

      - name: Usage feedback import integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check usage-feedback-import-integration

      - name: Usage feedback outcomes integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check usage-feedback-outcomes-integration

      - name: Usage feedback report integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check usage-feedback-report-integration

      - name: Usage feedback dashboard integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check usage-feedback-dashboard-integration

      - name: Usage feedback global integration
        continue-on-error: true
        run: bash evals/ci/run-baseline.sh --check usage-feedback-global-integration

      - name: Finalize CI evidence
        if: always()
        run: bash evals/ci/run-baseline.sh --finalize

      - name: Upload CI evidence artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flow-agents-ci-usage-feedback
          path: evals/results/ci-baseline/usage-feedback/
          if-no-files-found: warn
          retention-days: 14
