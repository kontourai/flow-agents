name: Flow Agents CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flow-agents-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Builder Kit Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Run deterministic CI baseline
        run: bash evals/ci/run-baseline.sh

      - name: Upload CI evidence artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: flow-agents-ci-baseline
          path: evals/results/ci-baseline/
          if-no-files-found: warn
          retention-days: 14
