name: Publish NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Serialize publish runs so a duplicate trigger (the release tag push and a
# workflow_dispatch firing within seconds of each other) cannot race: the second
# run waits for the first to finish, then the "Check Published Version" step sees
# the version already on npm and skips — instead of E403'ing on a double publish.
concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Validate source tree
        run: npm run validate:source --

      - name: Run static eval suite
        run: bash evals/run.sh static

      - name: Pack dry run
        run: npm pack --dry-run

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Build bundle
        run: npm run build --silent

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "FETCH_HEAD"; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from the fetched origin/main tip" >&2
            exit 1
          fi

      - name: Check published version
        id: published
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish public package
        if: steps.published.outputs.published != 'true'
        run: npm publish --access public --provenance
