enabled=true
channels=full,analytics
channel.full.redact=hook.raw_input,turn.prompt_text,tool.input,tool.output
channel.full.endpoint_url=http://localhost:3141/v1/agent-events
channel.analytics.redact=tool.input,tool.output,turn.prompt_text,delegation.targets.query,context.cwd,hook.raw_input,hook.last_assistant_message,hook.transcript_path
# Console mirror is opt-in. Prefer installer telemetry sinks such as
# local-kontour-console, kontour-hosted-console, or user-hosted-console.
# The transport derives /api/telemetry/records from console_telemetry_url.
# console_telemetry_token=
# console_tenant_id=
# Kit-economics relay (#469): once console_telemetry_url/console_telemetry_endpoint_url
# resolves, the per-run kit-economics record relay defaults ON (opt-out, not silent-off).
# Set console_economics_relay=0 to opt out while keeping the telemetry mirror; or run
# install-console-config.sh --no-economics-relay to write this at install time.
# console_economics_relay=0
# console_economics_endpoint_url=
# Live pricing registry source. If unset, derived from console_telemetry_url as
# <console>/api/telemetry/pricing so bash/Python/TS runtimes read one live
# source; lib/pricing.sh caches it and falls back to bundled pricing.json.
# console_pricing_url=https://console.kontourai.io/api/telemetry/pricing
enrich_system=true
enrich_workspace=true
enrich_auth=true
max_log_size_mb=50
max_log_files=3
sync_include=*
sync_exclude=neo-*,Neo,local-gamma-*
usage_tracking=true
notifications=true
notification_profile=standard
governance=true
governance_audit_max_size_mb=25
governance_audit_max_files=5
